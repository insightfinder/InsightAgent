# ============================================================================
# Visa log-collection config template.
# Run with: java -jar <appname>.jar --spring.config.location=file:<this file>
# Copy this file, fill in the empty / <placeholder> values, then point
# --spring.config.location at it.
# ============================================================================

# ----------------------------- Kafka consumer ------------------------------
# kafka1 cluster one. Use kafka2, kafka3 ... etc for multiple clusters.
# Comment out properties that are not required.
# bootstrap servers, provided by kafka cluster team (with port)
kafka1.bootstrap.servers=localhost:9092
# security.protocol, provided by kafka cluster team. Remove/comment if no protocol
#kafka1.security.protocol=
# consumer group id, unique per consumer group
kafka1.group.id=visaLogConsumer1
# topic carrying Visa log messages
kafka1.topic=visaLogTopic1
# number of consumers, normally = number of partitions
kafka1.concurrency=1
# offset reset: latest | earliest | none
#kafka1.auto.offset.reset=
# timeout used to detect client failures
#kafka1.session.timeout.ms=
# commit offsets periodically in the background (default true)
kafka1.enable.auto.commit=true
# max delay between poll() invocations, default 300000 (5 min)
kafka1.max.poll.interval.ms=300000
# max records returned per poll(), default 500
kafka1.max.poll.records=500
# NOTE: Visa has no metadata broadcast flow, so no separate metadata topic /
# consumer (e.g. kafka2 metadata1) is needed.

# ------------------------- InsightFinder connection ------------------------
# user name for InsightFinder
insight-finder.userName=kuang_insightfinder
# IF URL, example: https://app.insightfinder.com
insight-finder.serverUrl=https://stg.insightfinder.com
# URI the data is sent to
insight-finder.serverUri=/api/v1/customprojectrawdata
# auto-create project URI
insight-finder.checkAndCreateUri=/api/v1/check-and-add-custom-project
# InsightFinder license key
insight-finder.licenseKey=738dd1288d2c1aa0fcf03ec32044b8959e462d92
# project sample interval
insight-finder.samplingIntervalInSeconds=300
# the agent type
insight-finder.agentType=LogStreaming
# dataFormat JSON or String; Visa log messages are JSON
insight-finder.dataFormat=JSON

# SSL files (only if the IF endpoint needs a client cert). Leave these COMMENTED OUT
# when not used -- empty values (key=) are treated as "configured" and crash SSL setup.
#insight-finder.keystoreFile=
#insight-finder.keystorePassword=
#insight-finder.truststoreFile=
#insight-finder.truststorePassword=

# the buffer of every period, in seconds
insight-finder.bufferingTime=30
# Metadata flush interval, in seconds. MUST be > 0: init() always schedules the metadata
# flush task even for Visa (which produces no metadata), and a 0/unset value crashes startup.
insight-finder.logMetadataBufferingTime=300
# log raw-data parsing info (helpful while validating field paths)
insight-finder.logParsingInfo=true
# log sending data size and status
insight-finder.logSendingData=true
# print the kafka consumer metrics, in seconds
insight-finder.kafkaMetricLogInterval=60
# true: seek to latest offset; false: continue from committed offset
insight-finder.fastRecovery=true

# ------------------------------ Log project --------------------------------
# this is a log agent
insight-finder.logProject=true
# Vendor-specific log project resolution strategy.
# "visa": read the target project (and system) directly from each JSON message.
insight-finder.vendor=visa

# Timestamp comes from the "aip_time_stamp" field, e.g. "Jun 8, 2026 @ 18:44:15.551"
# (English month, no time zone -> parsed as UTC by the epoch/format-aware fallback).
insight-finder.logTimestampFormat=MMM d, yyyy @ HH:mm:ss.SSS
# Timestamp field path in the message.
insight-finder.logTimestampFieldPathList=aip_time_stamp
# Instance-name field path; first matching path wins.
insight-finder.logInstanceFieldPathList=hostname
# Component-name field is not yet determined for Visa; leave unset for now.
# When known, set one or more paths ("&"-joined paths yield a "-"-joined name).
#insight-finder.logComponentFieldPathList=

insight-finder.logProjectName=test-dynatrace-event
insight-finder.logSystemName=ee_sk

