agent:
  data_format: "json"
  timezone: "UTC"
  log_level: "INFO"
  filters_include: ""
  filters_exclude: ""

  # Operation mode:
  #   continuous        - (default) poll every sampling_interval seconds indefinitely
  #   historical        - download logs from Loki to local NDJSON files, then exit
  #                       Files can later be replayed to InsightFinder with mode "replay"
  #   stream_historical - stream Loki logs directly to InsightFinder, then exit
  #   replay            - read NDJSON files written by "historical" and send to InsightFinder
  mode: "continuous"

  # Required for historical / stream_historical modes.
  # Accepted formats: RFC3339 "2024-01-01T00:00:00Z"  or date-only "2024-01-01" (midnight UTC)
  start_time: "2026-04-08T00:00:00Z"
  end_time: ""

  # historical mode: directory where per-query NDJSON files are written.
  # File naming: {download_path}/{query_name}_{start_unix}_{end_unix}.ndjson
  # Each line is a JSON-encoded InsightFinder log entry (timestamp, tag, componentName, data).
  download_path: "./loki_downloads"

  # replay mode: path to a single .ndjson file or a directory of .ndjson files.
  # All files in the directory are replayed in sorted order.
  replay_path: ""

  # stream_historical / replay: seconds to wait between batches (0 = maximum speed)
  stream_chunk_interval: 0

loki:
  base_url: "http://localhost:46339"
  username: "admin"
  password: "admin"
  verify_ssl: false
  max_concurrent_requests: 10
  max_retries: 3
  query_timeout: 60
  max_entries_per_query: 1000
  
  # Default instance name field - determines what field to use as default instance name/tag
  # Options: container, instance, node_name, pod, app
  default_instance_name_field: "app"
  
  # List of queries to execute
  queries:
    - name: "insightfinder_audit_logs"
      query: '{namespace="insightfinder",pod=~".*appserver.*"} |= `com.insightfinder.models.AuditLog`'
      enabled: true
      labels:
        source: "insightfinder"
        type: "audit"
      # Optional: Override instance name field for this query (Options: container, instance, node_name, pod, app)
      # instance_name_field: "pod"
      # Optional: Set component name field for this query (Options: container, instance, node_name, pod, app)
      component_name_field: "container"
      # Optional: Set container name field (Options: container, instance, node_name, pod, app)
      container_name_field: "node_name"
      # Optional: mask sensitive data before sending to InsightFinder.
      # Each entry matches the regex and replaces all matches with the replacement string.
      # sensitive_data_filters:
      #   - regex: "password=\\S+"
      #     replacement: "password=***"
      #   - regex: "\\b\\d{4}[- ]?\\d{4}[- ]?\\d{4}[- ]?\\d{4}\\b"
      #     replacement: "[CARD_REDACTED]"
    
    - name: "application_errors"
      query: '{namespace="insightfinder"} |~ "ERROR|Exception|FATAL"'
      enabled: true
      labels:
        source: "insightfinder"
        type: "error"
      # Example of using query field parameters
      component_name_field: "container"
      container_name_field: "pod"
    
    - name: "kubernetes_events"
      query: '{namespace=~"kube-.*|default"} |= "Event"'
      enabled: true
      labels:
        source: "kubernetes"
        type: "event"
      instance_name_field: "container"
      component_name_field: "instance"
      container_name_field: "pod"

insightfinder:
  server_url: "https://app.insightfinder.com"
  username: ""  # Fill this in
  license_key: ""  # Fill this in
  
  # Logs project configuration (loki-agent only handles logs)
  logs_project_name: "loki-logs"
  logs_system_name: "loki-system"
  logs_project_type: "LOG"
  
  # Common settings
  sampling_interval: 60  # Main collection interval - determines both frequency and time window
  cloud_type: "OnPremise"
  instance_type: "OnPremise"
  is_container: true
  
  # HTTP proxy settings (optional)
  http_proxy: ""
  https_proxy: ""
  
  # Advanced settings
  chunk_size: 2097152  # 2MB
  max_packet_size: 10485760  # 10MB
  retry_times: 3
  retry_interval: 5